<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoVortex - Перегляд відео</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">
            <img src="VideoVortex_logo.ico" alt="VideoVortex" style="height: 50px; width: 50px; border-radius: 50%;">
            <h1>VideoVortex</h1>
        </a>
        <a href="index.html" class="back-button">← Назад</a>
    </nav>

    <div class="container">
        <div id="video-container">
            <video id="video-player" controls autoplay></video>
            <div class="video-info">
                <h2 id="video-title"></h2>
                <p id="video-author"></p>
                <p id="video-views"></p>
                <p id="video-date"></p>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBkPYP3bnDy61NFjRSboRZrfTVNTdIMWbY",
            authDomain: "videovortex-235cd.firebaseapp.com",
            databaseURL: "https://videovortex-235cd-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "videovortex-235cd",
            storageBucket: "videovortex-235cd.appspot.com",
            messagingSenderId: "681594250269",
            appId: "1:681594250269:web:1176b21fcc8fe2a7d052f4"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Отримання параметра з URL
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        const videoKey = getQueryParam("id");
        if (videoKey) {
            database.ref("videos/" + videoKey).once("value").then((snapshot) => {
                if (snapshot.exists()) {
                    const videoData = snapshot.val();
                    document.getElementById("video-player").src = videoData.url;
                    document.getElementById("video-title").innerText = videoData.title;
                    document.getElementById("video-author").innerText = "Автор: " + videoData.author;
                    document.getElementById("video-views").innerText = "Переглядів: " + (videoData.views || 0);
                    document.getElementById("video-date").innerText = "Дата публікації: " + videoData.publishDate;

                    // Оновлення кількості переглядів
                    database.ref("videos/" + videoKey).update({ views: (videoData.views || 0) + 1 });
                } else {
                    alert("Відео не знайдено.");
                    window.location.href = "index.html";
                }
            });
        } else {
            alert("Невірне посилання на відео.");
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
