<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Video Player</title>
    <style>
        /* Твої стилі, як у наданому коді */
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            color: #fff;
            text-align: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        nav {
            display: flex;
            align-items: center;
            width: 100%;
            background: #1c1e22;
            padding: 10px 20px;
            margin-bottom: 20px;
            border-radius: 8px;
        }
        nav a {
            color: #ffffff;
            text-decoration: none;
            padding: 3px 8px;
            border-radius: 5px;
            transition: color 0.3s ease, background 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        nav a:hover {
            background-color: #4facfe;
            color: #1c1e22;
        }
        .video-wrapper {
            position: relative;
            max-width: 800px;
            margin: 20px auto;
            background-color: #000;
            border-radius: 10px;
            overflow: hidden;
            width: 80%;
        }
        video {
            width: 100%;
            display: block;
            border-bottom: 2px solid #007BFF;
        }
        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #111;
            padding: 10px;
            color: #fff;
            flex-wrap: wrap;
        }
        button {
            background: #007BFF;
            border: none;
            padding: 6px 10px;
            color: #fff;
            border-radius: 5px;
            cursor: pointer;
            margin: 4px;
        }
        button:hover {
            background: #0056b3;
        }
        input[type="range"] {
            accent-color: #00f;
            margin: 4px;
        }
        #seek-bar {
            flex: 1 1 auto;
            margin: 0 10px;
        }
        #volume-bar {
            width: 100px;
        }
        #time-display {
            min-width: 90px;
            text-align: right;
            font-family: monospace;
        }
        @media (max-width: 600px) {
            .controls {
                flex-direction: column;
                align-items: flex-start;
            }
            #seek-bar,
            #volume-bar {
                width: 100%;
            }
            #time-display {
                align-self: flex-end;
            }
        }
        .video-info {
            text-align: center;
            font-size: 13px;
            color: #b0bec5;
            padding: 5px;
        }
        .avatar {
            font-weight: bold;
            font-size: 30px;
            color: white;
            background-color: #007BFF;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            line-height: 60px;
            margin: 0 auto 10px auto;
            user-select: none;
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
</head>
<body>
<nav>
    <a href="index.html">
        <img src="VideoVortex_logo.ico" alt="Logo" style="height: 50px; width: 50px; border-radius: 50%;" />
        <h1 style="padding-left: 5px; margin: 0;">VideoVortex</h1><sup style="margin-left: 3px; font-size: 0.6em;">beta</sup>
    </a>
</nav>

<div class="video-wrapper">
  <video id="custom-video" preload="metadata" controls></video>
</div>
    <!--<div class="controls">
    <button id="play-pause">▶️</button>
    <input type="range" id="seek-bar" value="0" min="0" max="100" step="0.1" />
    <span id="time-display">0:00 / 0:00</span>
    <input type="range" id="volume-bar" min="0" max="1" step="0.1" value="1" />
    <button id="fullscreen">⛶</button>
  </div>-->


<div class="video-info">
    <div class="avatar" id="avatar">?</div>
    <div id="details"></div>
</div>

<script>
const video = document.getElementById("custom-video");
const playPause = document.getElementById("play-pause");
const seekBar = document.getElementById("seek-bar");
const timeDisplay = document.getElementById("time-display");
const volumeBar = document.getElementById("volume-bar");
const fullscreen = document.getElementById("fullscreen");

playPause.addEventListener("click", () => {
  if (video.paused) {
    video.play();
    playPause.textContent = "⏸️";
  } else {
    video.pause();
    playPause.textContent = "▶️";
  }
});

video.addEventListener("timeupdate", () => {
  if (!isNaN(video.duration) && video.duration > 0) {
    const current = Math.floor(video.currentTime);
    const duration = Math.floor(video.duration);
    seekBar.value = (video.currentTime / video.duration) * 100 || 0;
    timeDisplay.textContent = `${formatTime(current)} / ${formatTime(duration)}`;
  }
});

seekBar.addEventListener("input", () => {
  if (!isNaN(video.duration) && video.duration > 0) {
    const time = (seekBar.value / 100) * video.duration;
    video.currentTime = time;
  }
});

volumeBar.addEventListener("input", () => {
  video.volume = volumeBar.value;
});

fullscreen.addEventListener("click", () => {
  if (video.requestFullscreen) {
    video.requestFullscreen();
  } else if (video.webkitRequestFullscreen) {
    video.webkitRequestFullscreen();
  } else if (video.msRequestFullscreen) {
    video.msRequestFullscreen();
  }
});

function formatTime(sec) {
  const min = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${min}:${s.toString().padStart(2, "0")}`;
}

// Отримання параметрів із URL
const urlParams = new URLSearchParams(window.location.search);
const videoUrl = urlParams.get("url");
const title = urlParams.get("title");
const author = urlParams.get("author");
const publishDate = urlParams.get("publishDate");
const description = urlParams.get("description");
const views = urlParams.get("views");
const avatarChar = urlParams.get("avatar") || "?";

// Встановлення відео і деталей
if (videoUrl) {
  video.src = videoUrl;
}

document.title = title || "Video Player";

const avatarDiv = document.getElementById("avatar");
avatarDiv.textContent = avatarChar;

const detailsDiv = document.getElementById("details");
detailsDiv.innerHTML = `
  <h2>${title || "Без назви"}</h2>
  <p><strong>Автор:</strong> ${author || "Анонім"}</p>
  <p><strong>Дата публікації:</strong> ${publishDate || "Не вказана"}</p>
  <p><strong>Переглядів:</strong> ${views || 0}</p>
  <p><strong>Опис:</strong> ${description || "Без опису"}</p>
`;

// Ініціалізація Firebase (треба додати власні дані конфігурації)
const firebaseConfig = {
     apiKey: "AIzaSyBkPYP3bnDy61NFjRSboRZrfTVNTdIMWbY",
     authDomain: "videovortex-235cd.firebaseapp.com",
     databaseURL: "https://videovortex-235cd-default-rtdb.europe-west1.firebasedatabase.app"
     projectId: "videovortex-235cd",
     storageBucket: "videovortex-235cd.appspot.com",
     messagingSenderId: "681594250269",
     appId: "1:681594250269:web:1176b21fcc8fe2a7d052f4"// Твої firebase конфігураційні дані сюди
};
firebase.initializeApp(firebaseConfig);

const database = firebase.database();

video.addEventListener("play", () => {
  // Оновлення лічильника переглядів в базі
  if (videoUrl) {
    // Для уникнення багаторазового збільшення можна робити це тут або на сервері
    // Простий приклад:
    const videoKey = urlParams.get("key");
    if (videoKey) {
      const viewsRef = database.ref("videos/" + videoKey + "/views");
      viewsRef.transaction(currentViews => {
        return (currentViews || 0) + 1;
      });
    }
  }
});
</script>
</body>
</html>
