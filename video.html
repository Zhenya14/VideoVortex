<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Перегляд відео</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js"></script>
</head>
<body>
    <div id="video-container">
        <video id="video-player" controls></video>
        <div id="video-info">
            <div id="avatar"></div>
            <div id="details"></div>
            <button id="delete-button" style="display: none; background-color: red; color: white;">Видалити</button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const videoKey = urlParams.get("key");
        const videoUrl = urlParams.get("url");
        const title = urlParams.get("title");
        const author = urlParams.get("author");
        const publishDate = urlParams.get("publishDate");
        const description = urlParams.get("description");
        const views = urlParams.get("views");
        const avatar = urlParams.get("avatar");

        document.getElementById("video-player").src = videoUrl;
        document.getElementById("avatar").innerText = avatar;
        document.getElementById("details").innerHTML = `
            <h2>${title}</h2>
            <p><strong>Автор:</strong> ${author}</p>
            <p><strong>Дата публікації:</strong> ${publishDate}</p>
            <p><strong>Перегляди:</strong> ${views}</p>
            <p><strong>Опис:</strong> ${description}</p>
        `;

        // Перевіряємо, чи поточний користувач є автором
        firebase.auth().onAuthStateChanged((user) => {
            if (user && user.email === author) {
                document.getElementById("delete-button").style.display = "block";
                document.getElementById("delete-button").onclick = () => deleteVideo(videoKey, videoUrl);
            }
        });

        function deleteVideo(videoKey, videoUrl) {
            if (confirm("Ви впевнені, що хочете видалити це відео?")) {
                firebase.database().ref(`videos/${videoKey}`).remove().then(() => {
                    alert("Відео видалено.");
                    window.close();
                }).catch(error => alert("Помилка: " + error.message));
            }
        }
    </script>
</body>
</html>
