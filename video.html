        /* Стилі для зображень з класом .photo-item */
img.photo-item {

        .photo-info {

        .avatar {

            font-weight: bold;
            color: #ffffff;
        }
        .video-details {
            display: inline-block;
            vertical-align: top;

        }
        #delete-account { 
            text-decoration: none;

.nsfw-label {
    background-color: red;
    color: white;
    font-weight: bold;

    font-size: 14px;
    margin-top: 10px;  /* Â³äñòóï, ùîá òåêñò íå ïåðåêðèâàâñÿ ç ³íøèìè åëåìåíòàìè */

.menu.active {
  position: absolute;
  height: 100%;
  width: 240px;
}
.menu {
    position: fixed;
    top: 0;
    left: 0;
    width: 0;
    height: 100%;
    background: #1c1e22;
    color: white;
    overflow-x: hidden;
    transition: width 0.3s ease-in-out;
    padding-top: 10px;
}

.menu a {
    padding: 10px 15px;
    text-decoration: none;
    color: white;
    display: block;
    transition: 0.3s;
}

.menu a:hover {
    background: #4facfe;
}

.content {
    transition: margin-left 0.3s ease-in-out;
}

.content-close {
  flex-grow: 1;
  padding: 0px;
  transition: margin-left 0.3s ease;
}
.content.active {
  margin-left: 240px;
}

nav {
            display: flex;
            align-items: center;

        nav a {

            transition: color 0.3s ease, background 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        nav a:hover {
            background-color: #4facfe;
            color: #1c1e22;
        }

<body>
    <nav>
        <a href="index.html" class="logo">
            <img src="VideoVortex_logo.ico" alt="VideoVortex" style="height: 50px; width: 50px; border-radius: 50%;">
            <h1>VideoVortex</h1>
        </a>
        <a href="index.html" class="back-button">← Назад</a>
    </nav>

    <div id="video-container">
        <video id="video-player" controls></video>
        <div id="video-info">
            <div id="avatar"></div>
            <div id="details"></div>
            <button id="delete-button" style="display: none; background-color: red; color: white;">Видалити</button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const videoKey = urlParams.get("key");
        const videoUrl = urlParams.get("url");
        const title = urlParams.get("title");
        const author = urlParams.get("author");
        const publishDate = urlParams.get("publishDate");
        const description = urlParams.get("description");
        const views = urlParams.get("views");
        const avatar = urlParams.get("avatar");

        document.getElementById("video-player").src = videoUrl;
        document.getElementById("avatar").innerText = avatar;
        document.getElementById("details").innerHTML = `
            <h2>${title}</h2>
            <p><strong>Автор:</strong> ${author}</p>
            <p><strong>Дата публікації:</strong> ${publishDate}</p>
            <p><strong>Перегляди:</strong> ${views}</p>
            <p><strong>Опис:</strong> ${description}</p>
        `;
        
    </script>
</body>
</html>
