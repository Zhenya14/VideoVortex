<script>
    let currentUserEmail = null;
/* ================= FIREBASE INIT ================= */
const firebaseConfig = {
    apiKey: "AIzaSyBkPYP3bnDy61NFjRSboRZrfTVNTdIMWbY",
    authDomain: "videovortex-235cd.firebaseapp.com",
    databaseURL: "https://videovortex-235cd-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "videovortex-235cd",
    storageBucket: "videovortex-235cd.appspot.com",
    messagingSenderId: "681594250269",
    appId: "1:681594250269:web:1176b21fcc8fe2a7d052f4"
};
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const database = firebase.database();

/* ================= HELPERS ================= */
function sanitize(text) {
    return String(text ?? "")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
}

function showNotFound() {
    document.body.innerHTML = `
        <div style="
            height:100vh;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            background:#0d1117;
            color:white;
            text-align:center;
        ">
            <h1>๐ฌ ะัะดะตะพ ะฝะต ะทะฝะฐะนะดะตะฝะพ</h1>
            <p>ะะพะฝะพ ะฑัะปะพ ะฒะธะดะฐะปะตะฝะต ะฐะฑะพ ะฝะตะดะพัััะฟะฝะต</p>
            <a href="index.html" style="color:#4facfe;">โฌ ะะฐ ะณะพะปะพะฒะฝั</a>
        </div>
    `;
}

/* ================= GET VIDEO KEY ================= */
const params = new URLSearchParams(location.search);
const videoKey = params.get("key");

if (!videoKey) {
    showNotFound();
    throw new Error("No video key");
}

/* ================= LOAD VIDEO ================= */
const videoPlayer = document.getElementById("video-player");
const detailsEl = document.getElementById("details");

database.ref("videos/" + videoKey).once("value").then(snapshot => {
    if (!snapshot.exists()) {
        showNotFound();
        return;
    }

    const video = snapshot.val();

    /* ===== BASIC RENDER ===== */
    document.title = sanitize(video.title);
    videoPlayer.src = video.url;

    detailsEl.innerHTML = `
        <h2>${sanitize(video.title)}</h2>
        <p><strong>ะะฒัะพั:</strong> ${sanitize(video.author || "ะะฝะพะฝัะผ")}</p>
        <p><strong>ะะฐัะฐ:</strong> ${sanitize(video.publishDate || "โ")}</p>
        <p><strong>ะะตัะตะณะปัะดะธ:</strong> <span id="view-count">${video.views || 0}</span></p>
        <p><strong>ะะฟะธั:</strong> ${sanitize(video.description || "ะะตะท ะพะฟะธัั")}</p>
    `;

    /* ===== UPDATE VIEWS (ONCE PER USER) ===== */
    const viewedKey = "viewed_" + videoKey;
    if (!localStorage.getItem(viewedKey)) {
        database.ref("videos/" + videoKey + "/views")
            .transaction(v => (v || 0) + 1);
        localStorage.setItem(viewedKey, "1");
    }

    /* ===== SIMILAR VIDEOS ===== */
    loadSimilarVideos(video);

}).catch(err => {
    console.error(err);
    showNotFound();
});

/* ================= SIMILAR VIDEOS ================= */
function loadSimilarVideos(currentVideo) {
    const container = document.getElementById("target-videos");
    const message = document.getElementById("message");
    container.innerHTML = "";

    let found = false;

    database.ref("videos").once("value").then(snapshot => {
        snapshot.forEach(child => {
            const v = child.val();

            if (!v || v.nsfw) return;
            if (v.title === currentVideo.title) return;
            if (v.private && v.email !== currentUserEmail) return;
            if (v.views === currentVideo.views) {
                found = true;
            if (v.domainRestrict && (!currentUserEmail || !currentUserEmail.endsWith("@kfccte-nau.ukr.education"))) return;
                const wrap = document.createElement("div");
                wrap.style.marginBottom = "20px";

                const title = document.createElement("h3");
                title.innerText = v.title;
                title.style.color = "white";

                const vid = document.createElement("video");
                vid.src = v.url;
                vid.muted = true;
                vid.loop = true;
                vid.autoplay = true;
                vid.style.width = "100%";
                vid.onclick = () => {
                    location.href = `video.html?key=${child.key}`;
                };

                wrap.appendChild(title);
                wrap.appendChild(vid);
                container.appendChild(wrap);
            }
        });

        if (!found && message) {
            message.style.display = "block";
        }
    });
}
</script>
