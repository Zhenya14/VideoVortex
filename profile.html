<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <title>Профіль користувача</title>
  <style>
    nav {
            display: flex;
            align-items: center;
            width: 100%;
            background: #1c1e22;
            padding: 10px 20px;
            margin-bottom: 20px;
            border-radius: 8px;
        }
        nav a {
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            padding: 8px 15px;
            border-radius: 5px;
            transition: color 0.3s ease, background 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        nav a:hover {
            background-color: #4facfe;
            color: #1c1e22;
        }
     body { 
            font-family: Arial, sans-serif; 
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            color: #ffffff; 
            text-align: center; 
            padding: 20px; 
            margin: 0;
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
    .profile-header {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
    }
    .avatar {
      background: #6c63ff;
      color: white;
      width: 70px;
      height: 70px;
      font-size: 28px;
      font-weight: bold;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 15px;
    }
    .posts .post {
      background: white;
      padding: 10px 15px;
      margin-bottom: 10px;
      border-left: 4px solid #6c63ff;
    }
  </style>
</head>
<body>
<nav>
            <a href="index.html"><img src="VideoVortex_logo.ico" style="height: 50px; width: 50px; border-radius: 50%;">
            <h1 style="padding-left: 5px;">VideoVortex</h1><sup style="margin-left: 3px; font-size: 0.6em;">beta</sup><sup><div id="timer"></div></sup></a>
        </div>
    </nav>
  <div class="profile-header">
    <div class="avatar" id="avatar">?</div>
    <div>
      <h2 id="userName">Завантаження...</h2>
      <div id="joinDate"></div>
    </div>
  </div>

  <div class="posts">
    <h3>Публікації</h3>
    <div id="postList"></div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_BUCKET",
      messagingSenderId: "YOUR_MSG_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const uid = user.uid;
        const userDoc = await getDoc(doc(db, "users", uid));

        if (userDoc.exists()) {
          const data = userDoc.data();
          const initials = data.fullName.split(" ").map(w => w[0]).join("").toUpperCase();

          document.getElementById("avatar").textContent = initials;
          document.getElementById("userName").textContent = data.fullName;
          document.getElementById("joinDate").textContent =
            "Приєднався: " + new Date(data.joined).toLocaleDateString("uk-UA");

          const postList = document.getElementById("postList");
          data.posts.forEach(post => {
            const div = document.createElement("div");
            div.className = "post";
            div.textContent = post;
            postList.appendChild(div);
          });
        } else {
          document.getElementById("userName").textContent = "Профіль не знайдено";
        }
      } else {
        document.getElementById("userName").textContent = "Користувач не увійшов";
      }
    });
  </script>
</body>
</html>
