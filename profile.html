<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <title>Профіль користувача</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #ff7e5f, #feb47b);
      color: #ffffff;
      text-align: center;
      margin: 0;
      padding: 20px;
    }
    .avatar {
      background: #6c63ff;
      width: 70px;
      height: 70px;
      font-size: 28px;
      font-weight: bold;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 10px;
    }
    video {
      width: 90%;
      max-width: 600px;
      margin-bottom: 20px;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="avatar" id="avatar">?</div>
  <h2 id="userName">Завантаження...</h2>
  <div id="joinDate"></div>
  <h3>Мої відео</h3>
  <div id="video-gallery"></div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBkPYP3bnDy61NFjRSboRZrfTVNTdIMWbY",
      authDomain: "videovortex-235cd.firebaseapp.com",
      databaseURL: "https://videovortex-235cd-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "videovortex-235cd",
      storageBucket: "videovortex-235cd.appspot.com",
      messagingSenderId: "681594250269",
      appId: "1:681594250269:web:1176b21fcc8fe2a7d052f4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const rtdb = getDatabase(app);

    let currentUserEmail = null;

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUserEmail = user.email;
        const uid = user.uid;
        const userDoc = await getDoc(doc(db, "users", uid));

        if (userDoc.exists()) {
          const data = userDoc.data();
          const initials = data.fullName.split(" ").map(w => w[0]).join("").toUpperCase();
          document.getElementById("avatar").textContent = initials;
          document.getElementById("userName").textContent = data.fullName;
          document.getElementById("joinDate").textContent = "Приєднався: " + new Date(data.joined).toLocaleDateString("uk-UA");
          loadUserVideos();
        } else {
          document.getElementById("userName").textContent = "Профіль не знайдено";
        }
      } else {
        document.getElementById("userName").textContent = "Користувач не увійшов";
      }
    });

    async function loadUserVideos() {
      const gallery = document.getElementById("video-gallery");
      gallery.innerHTML = "";
      const snapshot = await get(ref(rtdb, "videos"));

      snapshot.forEach((childSnapshot) => {
        const videoData = childSnapshot.val();
        if (videoData.email === currentUserEmail) {
          const video = document.createElement("video");
          video.src = videoData.url;
          video.controls = true;
          gallery.appendChild(video);
        }
      });
    }
  </script>
</body>
</html>
