<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Авторизація – VideoVortex</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <style>
    body { 
            margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top left, #0f172a, #0a0e1a);
    color: #e2e8f0;
    line-height: 1.6;
text-align: center;
    padding: 0 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
}
    .auth-form, .register-form { 
        background: rgba(255, 255, 255, 0.1); 
            padding: 20px; 
            border-radius: 10px; 
            margin-top: 130px;
    }
    input[type="text"], input[type="file"], input[type="email"], input[type="password"], button, #video-description, #photo-description { 
       width: 100%; 
            background-color: black;
            color: white;
            padding: 10px 0; 
            margin: 10px 0; 
            border-radius: 35px; 
            border: none; 
            outline: none;
            font-size: 1em;
    }
    
    button { 
            display: inline-block;
    padding: 12px 28px;
    border-radius: 50px;
    text-align: center;
    text-decoration: none;
    color: white;
    background: #111111;
    border: 2px solid #333333;
    transition: all 0.3s ease;
    box-shadow: 0 0 0 rgb(59 130 246 / 0%);
        }
        button:hover { 
            border-color: #f472b6; /* підсвічування рамки блакитним */

box-shadow: 0 0 15px #f472b6; /* світіння */

transform: translateY(-2px); /* легке підняття */
        }
button:active {
border-color: #06b6d4; /* рамка рожевого кольору при натисканні */

box-shadow: 0 0 10px #06b6d4; /* світіння при натисканні */

transform: scale(0.95); /* легке стиснення */
}
nav {
    display: flex;
    justify-content: center;
    padding: 0px 20px;
    background: rgb(26 26 26 / 68%);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 16px;
    box-shadow: 0 8px 32px rgb(0 0 0 / 20%);
    position: fixed;
    z-index: 100;
    width: 97%;
        }
        nav a {
height: 50px;
align-items: center;
    justify-content: center;
display: flex;
    padding: 0px 5px;
    border-radius: 50px;
    text-align: center;
    text-decoration: none;
    color: white;
    background: #111111;
    border: 2px solid #333333;
    transition: all 0.3s ease;
    box-shadow: 0 0 0 rgb(59 130 246 / 0%);
        }
        nav a:hover {
            border-color: #f472b6; /* підсвічування рамки блакитним */

box-shadow: 0 0 15px #f472b6; /* світіння */

transform: translateY(-2px); /* легке підняття */
        }
nav a:active {
border-color: #06b6d4; /* рамка рожевого кольору при натисканні */

box-shadow: 0 0 10px #06b6d4; /* світіння при натисканні */

transform: scale(0.95); /* легке стиснення */
}
  </style>
</head>
<body>
<nav>
<img src="VideoVortex_logo.ico" id="logo" style="height: 50px; width: 50px; border-radius: 50%;">
            <a href="index.html">
            <h1 style="padding-left: 5px;">VideoVortex</h1><sup style="margin-left: 3px; font-size: 0.6em;">beta</sup><sup><div id="timer"></div></sup></a>
</nav>
<!-- Модальне вікно апеляції -->
<div id="appeal-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); justify-content:center; align-items:center; z-index:200;">
  <div style="background:#fff; color:#000; padding:20px; border-radius:10px; width:90%; max-width:400px; text-align:left; position:relative;">
    <h2>Подати апеляцію</h2>
    <p>Ваш акаунт заблокований. Будь ласка, заповніть форму нижче, щоб оскаржити рішення.</p>
    <form id="appeal-form" action="https://formspree.io/f/xvgvjdej" method="POST">
  <label>
    <input type="email" name="email" id="appeal-email" placeholder="Ваш Email" required style="width:100%; padding:10px; margin:10px 0; border-radius:5px; border:1px solid #ccc;">
  </label>
  <label>
    <textarea name="message" id="appeal-message" placeholder="Опишіть причину апеляції" required style="width:100%; padding:10px; margin:10px 0; border-radius:5px; border:1px solid #ccc;"></textarea>
  </label>
  <button type="submit" style="padding:10px 20px; border:none; border-radius:5px; background:#4facfe; color:#fff; cursor:pointer;">Відправити</button>
</form>
    <button id="appeal-close" style="position:absolute; top:10px; right:10px; background:transparent; border:none; font-size:18px; cursor:pointer;">✖</button>
  </div>
</div>
<div class="container">
    <h2>Увійти</h2>
    <form id="auth-form">
      <input type="email" id="auth-email" placeholder="Email" required>
      <input type="password" id="auth-password" placeholder="Пароль" required>
      <p id="auth-notification"></p> <!-- змінено id, щоб не було конфлікту -->
      <button type="submit">Увійти</button>
    </form>

    <h2>Реєстрація</h2>
    <form id="register-form">
      <input type="text" id="register-name" placeholder="Ім’я" required>
      <input type="text" id="register-supername" placeholder="Прізвище" required>
      <input type="date" id="birthdate" required>
      <input type="email" id="register-email" placeholder="Email" required>
      <input type="password" id="register-password" placeholder="Пароль" required>
      <input type="password" id="register-confirmation-password" placeholder="Підтвердіть пароль" required>
      <p id="register-notification"></p> <!-- окремий блок повідомлень для реєстрації -->
      <button type="submit">Зареєструватися</button>
    </form>
</div>

<script>
    // 🔹 Виправлено помилку: dicument → document
    const authNotification = document.getElementById("auth-notification");
    const registerNotification = document.getElementById("register-notification");

    // Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyBkPYP3bnDy61NFjRSboRZrfTVNTdIMWbY",
        authDomain: "videovortex-235cd.firebaseapp.com",
        databaseURL: "https://videovortex-235cd-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "videovortex-235cd",
        storageBucket: "videovortex-235cd.appspot.com",
        messagingSenderId: "681594250269",
        appId: "1:681594250269:web:1176b21fcc8fe2a7d052f4"
    };
    firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();
    const database = firebase.database();
function openAppeal() {
    document.getElementById("appeal-modal").style.display = "flex";
}

// Закриття модального вікна
document.getElementById("appeal-close").addEventListener("click", () => {
    document.getElementById("appeal-modal").style.display = "none";
});
    // Авторизація
    document.getElementById("auth-form").addEventListener("submit", (e) => {
    e.preventDefault();

    const email = document.getElementById("auth-email").value.trim();
    const password = document.getElementById("auth-password").value.trim();

    auth.signInWithEmailAndPassword(email, password)
        .then(() => {
            authNotification.innerHTML = "✅ Вхід успішний!";
            authNotification.style.color = "green";
            window.location.href = "index.html";
        })
        .catch((error) => {
            if (error.code === "auth/user-disabled") {
                authNotification.innerHTML = "🚫 Ваш акаунт заблокований. Ви можете подати апеляцію.";

                const appealBtn = document.createElement("button");
                appealBtn.textContent = "Подати апеляцію";
                appealBtn.style.marginLeft = "10px";
                appealBtn.style.padding = "5px 10px";
                appealBtn.style.border = "none";
                appealBtn.style.borderRadius = "5px";
                appealBtn.style.background = "#4facfe";
                appealBtn.style.color = "#fff";
                appealBtn.style.cursor = "pointer";
                appealBtn.onclick = openAppeal;

                authNotification.appendChild(appealBtn);
            } else if (error.code === "auth/wrong-password" || error.code === "auth/invalid-email") {
                authNotification.innerHTML = "❌ Невірний логін або пароль.";
            } else if (error.code === "auth/user-not-found") {
                authNotification.innerHTML = "⚠️ Користувача з такою поштою не існує.";
            } else {
                authNotification.innerHTML = "❌ Невірний логін або пароль.";
            }
            authNotification.style.color = "red";
        });
});

    // Реєстрація
    document.getElementById("register-form").addEventListener("submit", async (e) => {
        e.preventDefault();

        const name = document.getElementById("register-name").value.trim();
        const supername = document.getElementById("register-supername").value.trim();
        const email = document.getElementById("register-email").value.trim();
        const password = document.getElementById("register-password").value.trim();
        const confirmation = document.getElementById("register-confirmation-password").value.trim();
        const birthInput = document.getElementById("birthdate").value;

        if (!name || !supername || !email || !password || !confirmation || !birthInput) {
            registerNotification.innerHTML = "Будь ласка, заповніть всі поля!";
            registerNotification.style.color = "red";
            return; // зупинити виконання
        }

        if (password !== confirmation) {
            registerNotification.innerHTML = "Паролі не збігаються!";
            registerNotification.style.color = "red";
            return; // зупинити виконання
        }

        const [year, month, day] = birthInput.split("-");
        const birthdate = `${day}.${month}.${year}`;

        try {
            const userCredential = await auth.createUserWithEmailAndPassword(email, password);
            const uid = userCredential.user.uid;

            await database.ref("users/" + uid).set({
                name: name,
                supername: supername,
                email: email,
                birthdate: birthdate,
                createdAt: new Date().toISOString(),
                status: "active"
            });

            registerNotification.innerHTML = "✅ Реєстрація успішна!";
            registerNotification.style.color = "green";
            setTimeout(() => window.location.href = "index.html", 1000);
        } catch (error) {
            if (error.code === "auth/email-already-in-use") {
                registerNotification.innerHTML = "❗ Така електронна пошта вже використовується!";
            } else if (error.code === "auth/weak-password") {
                registerNotification.innerHTML = "⚠️ Пароль має бути щонайменше 6 символів!";
            } else {
                registerNotification.innerHTML = "Помилка: " + error.message;
            }
            registerNotification.style.color = "red";
        }
    });
</script>
</body>
</html>
