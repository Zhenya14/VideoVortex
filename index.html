<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoVortex</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <style>
        /* Styles remain the same */
    </style>
</head>
<body>
    <nav>
        <a href="#" id="home-link">Головна</a>
        <a href="#" id="upload-link">Завантажити відео</a>
        <a href="#" id="auth-link">Аутентифікація</a>
    </nav>

    <div class="container">
        <h1>VideoVortex</h1>

        <!-- Форма аутентифікації -->
        <div class="auth-form" id="auth-form">
            <h2>Увійти</h2>
            <input type="email" id="auth-email" placeholder="Електронна пошта">
            <input type="password" id="auth-password" placeholder="Пароль">
            <button onclick="signIn()">Увійти</button>
        </div>

        <!-- Форма завантаження відео -->
        <div class="upload-form" id="upload-form">
            <h2>Завантажити відео</h2>
            <input type="text" id="video-title" placeholder="Назва відео">
            <input type="file" id="video-file" accept="video/*">
            <button onclick="uploadVideo()">Завантажити</button>
        </div>

        <div class="video-container" id="video-gallery"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBkPYP3bnDy61NFjRSboRZrfTVNTdIMWbY",
            authDomain: "videovortex-235cd.firebaseapp.com",
            databaseURL: "https://videovortex-235cd-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "videovortex-235cd",
            storageBucket: "videovortex-235cd.appspot.com",
            messagingSenderId: "681594250269",
            appId: "1:681594250269:web:1176b21fcc8fe2a7d052f4"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();
        const storage = firebase.storage();

        // Toggle auth and upload forms
        document.getElementById("auth-link").onclick = () => {
            document.getElementById("auth-form").style.display ^= 'block';
        };

        document.getElementById("upload-link").onclick = () => {
            if (auth.currentUser) {
                document.getElementById("upload-form").style.display ^= 'block';
            } else {
                alert("Ви повинні бути авторизовані, щоб завантажувати відео.");
            }
        };

        // User sign-in function
        function signIn() {
            const email = document.getElementById("auth-email").value;
            const password = document.getElementById("auth-password").value;

            auth.signInWithEmailAndPassword(email, password)
                .then(() => {
                    alert("Вхід успішний!");
                    document.getElementById("auth-form").style.display = "none";
                    document.getElementById("auth-link").style.display = "none";
                })
                .catch(error => {
                    alert("Помилка входу: " + error.message);
                });
        }

        // Load and display videos
        function loadVideos() {
            const videoGallery = document.getElementById("video-gallery");
            videoGallery.innerHTML = "";

            database.ref("videos").once("value").then(snapshot => {
                snapshot.forEach(childSnapshot => {
                    const videoData = childSnapshot.val();
                    const videoElement = document.createElement("div");

                    videoElement.innerHTML = `
                        <video src="${videoData.url}" controls data-key="${childSnapshot.key}" onclick="incrementViews('${childSnapshot.key}')"></video>
                        <div class="video-info">
                            <p>Перегляди: ${videoData.views}</p>
                            <p>Дата публікації: ${new Date(videoData.timestamp).toLocaleDateString()}</p>
                            <p>Назва: ${videoData.title}</p>
                            <p>Автор: ${videoData.authorName || "Невідомий автор"}</p>
                        </div>
                    `;

                    videoGallery.appendChild(videoElement);
                });
            });
        }

        // Increment view count when video is played
        function incrementViews(videoKey) {
            const videoRef = database.ref(`videos/${videoKey}/views`);
            videoRef.transaction(currentViews => (currentViews || 0) + 1);
        }

        // Upload video with user restriction
        function uploadVideo() {
            if (!auth.currentUser) {
                alert("Тільки авторизовані користувачі можуть завантажувати відео.");
                return;
            }

            const title = document.getElementById("video-title").value;
            const videoFile = document.getElementById("video-file").files[0];

            if (!title || !videoFile) {
                alert("Будь ласка, введіть назву відео та виберіть файл.");
                return;
            }

            const storageRef = storage.ref(`videos/${videoFile.name}`);
            const uploadTask = storageRef.put(videoFile);

            uploadTask.on('state_changed', (snapshot) => {
                const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                console.log(`Завантаження: ${progress}%`);
            }, (error) => {
                alert("Помилка завантаження: " + error.message);
            }, () => {
                uploadTask.snapshot.ref.getDownloadURL().then((downloadURL) => {
                    const videoData = {
                        title: title,
                        url: downloadURL,
                        views: 0,
                        timestamp: Date.now(),
                        authorName: auth.currentUser.email
                    };

                    database.ref("videos").push(videoData).then(() => {
                        alert("Відео успішно завантажено!");
                        loadVideos();
                        document.getElementById("upload-form").reset();
                        document.getElementById("upload-form").style.display = "none";
                    });
                });
            });
        }

        // Load videos on page load
        window.onload = loadVideos;
    </script>
</body>
</html>
