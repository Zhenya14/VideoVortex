<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoVortex</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }

        nav {
            background-color: #333;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
        }

        .container {
            padding: 20px;
        }

        .auth-form, .upload-form {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        input {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            padding: 10px 15px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #218838;
        }

        .video-item {
            width: 100%;
            max-width: 640px;
            margin: 20px 0;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            background-color: white;
        }

        .video-info {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-right: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: white;
        }

        #progress-container {
            display: none;
            width: 100%;
            background-color: #f3f3f3;
            margin-top: 10px;
            border-radius: 4px;
        }

        #progress-bar {
            width: 0;
            height: 10px;
            background-color: #4caf50;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <nav>
        <h1>VideoVortex</h1>
        <div>
            <a href="#" id="home-link">Головна</a>
            <a href="#" id="upload-link" style="display: none;">Завантажити відео</a>
            <a href="#" id="auth-link">Увійти</a>
            <a href="#" id="logout-link" style="display: none;">Вийти</a>
        </div>
    </nav>

    <div class="container">
        <div class="auth-form" id="auth-form">
            <h2>Увійти</h2>
            <input type="email" id="auth-email" placeholder="Електронна пошта">
            <input type="password" id="auth-password" placeholder="Пароль">
            <button onclick="signIn()">Увійти</button>
        </div>

        <div class="upload-form" id="upload-form">
            <h2>Завантажити відео</h2>
            <input type="text" id="video-title" placeholder="Назва відео">
            <input type="text" id="video-author" placeholder="Ім'я автора">
            <input type="file" id="video-file" accept="video/*">
            <button onclick="uploadVideo()">Завантажити</button>
            <div id="progress-container">
                <div id="progress-bar"></div>
            </div>
        </div>

        <div class="video-container" id="video-gallery"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBkPYP3bnDy61NFjRSboRZrfTVNTdIMWbY",
            authDomain: "videovortex-235cd.firebaseapp.com",
            databaseURL: "https://videovortex-235cd-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "videovortex-235cd",
            storageBucket: "videovortex-235cd.appspot.com",
            messagingSenderId: "681594250269",
            appId: "1:681594250269:web:1176b21fcc8fe2a7d052f4"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();
        const storage = firebase.storage();

        // Toggle authentication form
        document.getElementById("auth-link").onclick = function() {
            const authForm = document.getElementById("auth-form");
            authForm.style.display = authForm.style.display === "none" ? "block" : "none";
        };

        // Toggle upload form
        document.getElementById("upload-link").onclick = function() {
            if (auth.currentUser) {
                const uploadForm = document.getElementById("upload-form");
                uploadForm.style.display = uploadForm.style.display === "none" ? "block" : "none";
            } else {
                alert("Будь ласка, увійдіть, щоб завантажити відео.");
            }
        };

        // Sign in function
        function signIn() {
            const email = document.getElementById("auth-email").value;
            const password = document.getElementById("auth-password").value;

            auth.signInWithEmailAndPassword(email, password)
                .then(() => {
                    alert("Вхід успішний!");
                    document.getElementById("auth-form").style.display = "none";
                    document.getElementById("auth-link").style.display = "none";
                    document.getElementById("upload-link").style.display = "flex";
                    document.getElementById("logout-link").style.display = "flex"; // Show logout button
                    loadVideos(); // Load videos after successful login
                })
                .catch((error) => {
                    alert("Невірний логін або пароль.");
                });
        }

        // Load videos and update views on click
        function loadVideos() {
            const videoGallery = document.getElementById("video-gallery");
            videoGallery.innerHTML = "";

            database.ref("videos").once("value").then((snapshot) => {
                snapshot.forEach((childSnapshot) => {
                    const videoData = childSnapshot.val();
                    const videoKey = childSnapshot.key; // Key for updating view count

                    const videoElement = document.createElement("video");
                    videoElement.src = videoData.url;
                    videoElement.controls = true;
                    videoElement.classList.add("video-item");
                    videoElement.onclick = () => {
                        updateViews(videoKey); // Update views on click
                    };

                    const infoElement = document.createElement("div");
                    infoElement.classList.add("video-info");

                    // Avatar
                    const avatar = document.createElement("div");
                    avatar.classList.add("avatar");
                    avatar.style.backgroundColor = getRandomColor();
                    const initials = videoData.author ? videoData.author.charAt(0).toUpperCase() : "?";
                    avatar.textContent = initials;

                    // Video details
                    const videoDetails = document.createElement("div");
                    videoDetails.classList.add("video-details");
                    const date = new Date(videoData.date).toLocaleDateString();
                    videoDetails.innerHTML = `
                        ${videoData.author}<br>
                        <strong>${videoData.title}</strong> <span>(${videoData.views} переглядів)</span><br>${date}
                    `;

                    // Append avatar and details
                    infoElement.appendChild(avatar);
                    infoElement.appendChild(videoDetails);
                    videoGallery.appendChild(infoElement);
                    videoGallery.appendChild(videoElement);
                });
            });
        }

        // Update views function
        function updateViews(videoKey) {
            // Retrieve the current view count before incrementing
            database.ref("videos/" + videoKey).once("value").then((snapshot) => {
                const currentViews = snapshot.val().views || 0; // Get current views, default to 0
                const newViews = currentViews + 1; // Increment view count

                // Update the view count in the database
                database.ref("videos/" + videoKey).update({ views: newViews })
                    .then(() => {
                        loadVideos(); // Reload videos to show updated views
                    });
            });
        }

        // Upload video function
        function uploadVideo() {
            const title = document.getElementById("video-title").value;
            const author = document.getElementById("video-author").value;
            const file = document.getElementById("video-file").files[0];

            if (file) {
                const storageRef = storage.ref("videos/" + file.name);
                const uploadTask = storageRef.put(file);

                uploadTask.on("state_changed", (snapshot) => {
                    const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                    document.getElementById("progress-container").style.display = "block";
                    document.getElementById("progress-bar").style.width = progress + "%";
                }, (error) => {
                    console.error("Upload failed:", error);
                }, () => {
                    uploadTask.snapshot.ref.getDownloadURL().then((downloadURL) => {
                        const videoData = {
                            title: title,
                            author: author,
                            url: downloadURL,
                            date: new Date().toISOString(),
                            views: 0
                        };
                        database.ref("videos").push(videoData).then(() => {
                            alert("Відео завантажено!");
                            document.getElementById("upload-form").reset();
                            document.getElementById("progress-container").style.display = "none";
                            loadVideos(); // Reload videos
                        });
                    });
                });
            } else {
                alert("Будь ласка, виберіть файл відео.");
            }
        }

        // Log out function
        document.getElementById("logout-link").onclick = function() {
            auth.signOut().then(() => {
                alert("Вихід успішний!");
                document.getElementById("auth-link").style.display = "flex"; // Show login link
                document.getElementById("upload-link").style.display = "none"; // Hide upload link
                document.getElementById("logout-link").style.display = "none"; // Hide logout link
                document.getElementById("video-gallery").innerHTML = ""; // Clear video gallery
            });
        };

        // Get a random color for the avatar
        function getRandomColor() {
            const letters = '0123456789ABCDEF';
            let color = '#';
            for (let i = 0; i < 6; i++) {
                color += letters[Math.floor(Math.random() * 16)];
            }
            return color;
        }

        // Load videos on page load
        window.onload = function() {
            loadVideos();
        };
    </script>
</body>
</html>
