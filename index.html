<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoVortex</title>
    <!-- Підключення Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
            text-align: center;
            padding: 50px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        input[type="text"], input[type="file"], input[type="email"], input[type="password"] {
            margin: 10px 0;
            padding: 10px;
            width: 100%;
        }
        select {
            padding: 10px;
            width: 100%;
            margin: 10px 0;
        }
        button {
            padding: 10px;
            background-color: #00f2fe;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #00b0b9;
        }
        .video-container {
            margin-top: 20px;
        }
        video {
            display: block;
            margin: 10px auto;
            width: 100%;
        }
        .auth-container {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>VideoVortex</h1>

        <div class="auth-container">
            <h2>Аутентифікація</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Пароль">
            <button id="login">Увійти</button>
            <button id="logout" style="display:none;">Вихід</button>
        </div>

        <input type="text" id="video-title" placeholder="Назва відео">
        <input type="file" id="video-file" accept="video/*">
        <select id="video-privacy">
            <option value="public">Публічне</option>
            <option value="private">Приватне</option>
        </select>
        <input type="text" id="allowed-emails" placeholder="Дозволені електронні адреси (через кому)" style="display:none;">
        <button id="upload-video">Завантажити відео</button>
        <p id="progress"></p>
        <div class="video-container" id="video-gallery"></div>
    </div>

    <script>
        // Firebase налаштування
        var firebaseConfig = {
            apiKey: "AIzaSyBkPYP3bnDy61NFjRSboRZrfTVNTdIMWbY",
            authDomain: "videovortex-235cd.firebaseapp.com",
            databaseURL: "https://videovortex-235cd-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "videovortex-235cd",
            storageBucket: "videovortex-235cd.appspot.com",
            messagingSenderId: "681594250269",
            appId: "1:681594250269:web:1176b21fcc8fe2a7d052f4",
            measurementId: "G-PHRT9C7GVP"
        };
        firebase.initializeApp(firebaseConfig);
        var storage = firebase.storage();
        var database = firebase.database();
        var auth = firebase.auth();

        // Аутентифікація
        document.getElementById("login").addEventListener("click", function() {
            var email = document.getElementById("email").value;
            var password = document.getElementById("password").value;

            auth.signInWithEmailAndPassword(email, password).then(() => {
                document.getElementById("login").style.display = 'none';
                document.getElementById("logout").style.display = 'inline';
                alert("Увійшли в систему!");
                loadVideos(); // Завантажити відео після входу
            }).catch((error) => {
                alert('Невірний логін або пароль.');
            });
        });

        document.getElementById("logout").addEventListener("click", function() {
            auth.signOut().then(() => {
                document.getElementById("logout").style.display = 'none';
                document.getElementById("login").style.display = 'inline';
                alert("Вийшли з системи!");
            });
        });

        // Показати поле для введення електронних адрес, якщо вибрано "Приватне" відео
        document.getElementById('video-privacy').addEventListener('change', function() {
            if (this.value === 'private') {
                document.getElementById('allowed-emails').style.display = 'block';
            } else {
                document.getElementById('allowed-emails').style.display = 'none';
            }
        });

        // Завантаження відео
        document.getElementById("upload-video").addEventListener("click", function() {
            var title = document.getElementById("video-title").value;
            var fileInput = document.getElementById("video-file");
            var file = fileInput.files[0];
            var privacy = document.getElementById("video-privacy").value;
            var allowedEmails = document.getElementById("allowed-emails").value.split(",").map(email => email.trim());
            var userId = auth.currentUser ? auth.currentUser.uid : null;

            if (!title || !file) {
                alert("Будь ласка, введіть назву відео та виберіть файл.");
                return;
            }

            // Перевірка формату файлу
            var validFormats = ["video/mp4", "video/webm", "video/ogg", "video/x-msvideo"];
            if (!validFormats.includes(file.type)) {
                alert("Неправильний формат відео. Завантажте відео у форматі MP4, WEBM, OGG або AVI.");
                return;
            }

            var storageRef = storage.ref('videos/' + file.name);
            var uploadTask = storageRef.put(file);

            uploadTask.on('state_changed', function(snapshot) {
                var progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                document.getElementById('progress').innerHTML = 'Завантаження: ' + progress + '%';
            }, function(error) {
                console.error('Помилка завантаження:', error);
            }, function() {
                uploadTask.snapshot.ref.getDownloadURL().then(function(downloadURL) {
                    // Зберігаємо дані в Realtime Database
                    database.ref('videos').push({
                        title: title,
                        url: downloadURL,
                        privacy: privacy,
                        allowedEmails: privacy === "private" ? allowedEmails : [] // Додаємо електронні адреси, якщо відео приватне
                    });
                    alert("Відео успішно завантажено!");
                    loadVideos(); // Оновити список відео після завантаження
                });
            });
        });

        // Завантаження та відображення всіх відео
        function loadVideos() {
            var videoGallery = document.getElementById("video-gallery");
            videoGallery.innerHTML = ''; // Очищуємо галерею

            database.ref('videos').once('value', function(snapshot) {
                snapshot.forEach(function(childSnapshot) {
                    var videoData = childSnapshot.val();
                    var userEmail = auth.currentUser ? auth.currentUser.email : null;
                    var canView = videoData.privacy === "public" || 
                                  (videoData.privacy === "private" && videoData.allowedEmails.includes(userEmail));

                    if (canView) {
                        var videoElement = document.createElement('video');
                        var titleElement = document.createElement('p');

                        titleElement.textContent = videoData.title;
                        videoElement.src = videoData.url;
                        videoElement.controls = true;

                        videoGallery.appendChild(titleElement);
                        videoGallery.appendChild(videoElement);
                    }
                });
            });
        }

        // Завантажити всі відео при завантаженні сторінки
        window.onload = function() {
            loadVideos();
        };
    </script>
</body>
</html>
