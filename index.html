<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoVortex</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
            text-align: center;
            padding: 50px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        nav {
            background: #00f2fe;
            padding: 10px;
            margin-bottom: 20px;
        }
        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
        }
        input[type="text"], input[type="file"], input[type="email"], input[type="password"], select {
            margin: 10px 0;
            padding: 10px;
            width: 100%;
        }
        button {
            padding: 10px;
            background-color: #00f2fe;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        .video-container {
            margin-top: 20px;
        }
        video {
            display: block;
            margin: 10px auto;
            width: 100%;
            cursor: pointer;
        }
        .video-info {
            color: #ddd;
            font-size: 14px;
        }
        .author-info {
            margin-top: 10px;
            font-size: 16px;
            color: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #0077b6;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <nav>
        <a href="#" id="home-link">Головна</a>
        <a href="#" id="upload-link">Завантажити відео</a>
        <a href="#" id="auth-link">Аутентифікація</a>
    </nav>

    <div class="container">
        <h1>VideoVortex</h1>

        <div class="video-container" id="video-gallery"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBkPYP3bnDy61NFjRSboRZrfTVNTdIMWbY",
            authDomain: "videovortex-235cd.firebaseapp.com",
            databaseURL: "https://videovortex-235cd-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "videovortex-235cd",
            storageBucket: "videovortex-235cd.appspot.com",
            messagingSenderId: "681594250269",
            appId: "1:681594250269:web:1176b21fcc8fe2a7d052f4"
        };
        firebase.initializeApp(firebaseConfig);
        const storage = firebase.storage();
        const database = firebase.database();
        const auth = firebase.auth();

        window.onload = loadVideos;

        // Завантаження та відображення всіх відео
        function loadVideos() {
            const videoGallery = document.getElementById("video-gallery");
            videoGallery.innerHTML = ''; // Очищення галереї

            database.ref('videos/').once('value').then(function(snapshot) {
                if (!snapshot.exists()) {
                    console.log("Відео не знайдено.");
                    return;
                }

                snapshot.forEach(function(childSnapshot) {
                    const videoData = childSnapshot.val();

                    if (videoData && videoData.title && videoData.url) {
                        const videoElement = document.createElement('video');
                        const titleElement = document.createElement('p');
                        const viewsElement = document.createElement('p');
                        const dateElement = document.createElement('p');
                        const authorElement = document.createElement('div');

                        titleElement.textContent = videoData.title;
                        videoElement.src = videoData.url;
                        videoElement.controls = true;
                        videoElement.addEventListener('click', () => displayVideoInfo(childSnapshot.key, videoData));

                        viewsElement.className = 'video-info';
                        viewsElement.textContent = `Переглядів: ${videoData.views || 0}`;
                        dateElement.className = 'video-info';
                        dateElement.textContent = `Дата публікації: ${videoData.date || "Не вказано"}`;

                        videoGallery.appendChild(titleElement);
                        videoGallery.appendChild(videoElement);
                        videoGallery.appendChild(viewsElement);
                        videoGallery.appendChild(dateElement);
                    }
                });
            });
        }

        // Відображення інформації про відео після натискання
        function displayVideoInfo(videoId, videoData) {
            const userEmail = videoData.uploadedBy || "Анонімний автор";
            const userName = userEmail.split('@')[0];  // Ім'я з email
            const authorAvatar = document.createElement('div');
            authorAvatar.className = 'avatar';
            authorAvatar.textContent = userName.charAt(0).toUpperCase(); // Аватар з ініціалами
            
            const authorInfo = document.createElement('div');
            authorInfo.className = 'author-info';
            authorInfo.innerHTML = `<div class="avatar">${authorAvatar.textContent}</div><span>${userName}</span>`;

            // Додати кількість переглядів
            const views = videoData.views || 0;
            database.ref(`videos/${videoId}/views`).set(views + 1); // Збільшення переглядів

            const videoElement = document.querySelector(`video[src="${videoData.url}"]`);
            videoElement.parentElement.appendChild(authorInfo); // Додаємо під відео
        }
    </script>
</body>
</html>
