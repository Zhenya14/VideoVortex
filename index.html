<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoVortex</title>
    <link rel="icon" href="VideoVortex_logo.ico">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <script src="https://apis.google.com/js/api.js"></script>
    <style>
        /* Add your styles here */
    </style>
</head>
<body>
    <nav>
        <!-- Navbar content here -->
    </nav>
    <div class="container">
        <!-- Forms for Auth, Video Upload, etc. -->
    </div>
    <div class="video-container" id="video-gallery"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBkPYP3bnDy61NFjRSboRZrfTVNTdIMWbY",
            authDomain: "videovortex-235cd.firebaseapp.com",
            databaseURL: "https://videovortex-235cd-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "videovortex-235cd",
            storageBucket: "videovortex-235cd.appspot.com",
            messagingSenderId: "681594931828",
            appId: "1:681594931828:web:394fd732ee7bcb0f6d0cbe",
            measurementId: "G-HFYW25Z57T"
        };

        firebase.initializeApp(firebaseConfig);

        const auth = firebase.auth();
        const storage = firebase.storage();
        const database = firebase.database();

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById("auth-link").style.display = "none";
                document.getElementById("register-link").style.display = "none";
                document.getElementById("upload-link").style.display = "block";
                document.getElementById("logout-link").style.display = "block";
            } else {
                document.getElementById("auth-link").style.display = "block";
                document.getElementById("register-link").style.display = "block";
                document.getElementById("upload-link").style.display = "none";
                document.getElementById("logout-link").style.display = "none";
            }
        });

        // Handle login
        function signIn() {
            const email = document.getElementById("auth-email").value;
            const password = document.getElementById("auth-password").value;
            auth.signInWithEmailAndPassword(email, password)
                .then(() => {
                    alert("Успішно увійшли");
                })
                .catch(error => {
                    alert("Помилка: " + error.message);
                });
        }

        // Handle sign up
        function signUp() {
            const email = document.getElementById("register-email").value;
            const password = document.getElementById("register-password").value;
            auth.createUserWithEmailAndPassword(email, password)
                .then(() => {
                    alert("Реєстрація пройшла успішно");
                })
                .catch(error => {
                    alert("Помилка: " + error.message);
                });
        }

        // Handle sign out
        function signOut() {
            auth.signOut()
                .then(() => {
                    alert("Ви вийшли з акаунту");
                })
                .catch(error => {
                    alert("Помилка при виході");
                });
        }

        // Handle video upload
        function uploadVideo() {
            const title = document.getElementById("video-title").value;
            const author = document.getElementById("video-author").value;
            const file = document.getElementById("video-file").files[0];

            if (!file) {
                alert("Будь ласка, виберіть відео для завантаження.");
                return;
            }

            const storageRef = storage.ref("videos/" + file.name);
            const uploadTask = storageRef.put(file);

            // Monitor upload progress
            uploadTask.on("state_changed", snapshot => {
                const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                document.getElementById("upload-progress").value = progress;
                document.getElementById("progress-text").innerText = progress.toFixed(2) + "%";
            }, error => {
                console.error("Upload failed:", error);
                alert("Помилка при завантаженні відео.");
            }, () => {
                // On success
                uploadTask.snapshot.ref.getDownloadURL().then(downloadURL => {
                    // Save video metadata to Firebase Realtime Database
                    const videoData = {
                        title: title,
                        author: author,
                        videoURL: downloadURL,
                        timestamp: new Date().toISOString()
                    };
                    database.ref("videos").push(videoData);

                    alert("Відео завантажено успішно!");
                    loadVideos();
                });
            });
        }

        // Load videos from Firebase
        function loadVideos() {
            const videosRef = database.ref("videos");
            videosRef.on("value", snapshot => {
                const videosContainer = document.getElementById("video-gallery");
                videosContainer.innerHTML = "";
                snapshot.forEach(childSnapshot => {
                    const videoData = childSnapshot.val();
                    const videoElement = document.createElement("div");
                    videoElement.classList.add("video");
                    videoElement.innerHTML = `
                        <video controls>
                            <source src="${videoData.videoURL}" type="video/mp4">
                            Your browser does not support the video tag.
                        </video>
                        <div class="video-info">
                            <strong>${videoData.title}</strong><br>
                            Автор: ${videoData.author}<br>
                            Дата: ${new Date(videoData.timestamp).toLocaleString()}
                        </div>
                    `;
                    videosContainer.appendChild(videoElement);
                });
            });
        }

        // Initially load videos
        loadVideos();
    </script>
</body>
</html>
