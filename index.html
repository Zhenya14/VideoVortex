<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoVortex</title>
    <!-- Підключення Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
            text-align: center;
            padding: 50px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        input[type="text"], input[type="file"] {
            margin: 10px 0;
            padding: 10px;
            width: 100%;
        }
        button {
            padding: 10px;
            background-color: #00f2fe;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #00b0b9;
        }
        .video-container {
            margin-top: 20px;
        }
        video {
            display: block;
            margin: 10px auto;
            width: 100%; /* Робимо відео адаптивним */
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>VideoVortex</h1>
        <input type="text" id="video-title" placeholder="Назва відео">
        <input type="file" id="video-file" accept="video/*">
        <button id="upload-video">Завантажити відео</button>
        <div class="video-container" id="video-gallery"></div>
    </div>

    <script>
        // Firebase налаштування
        var firebaseConfig = {
            apiKey: "AIzaSyBkPYP3bnDy61NFjRSboRZrfTVNTdIMWbY",
            authDomain: "videovortex-235cd.firebaseapp.com",
            databaseURL: "https://videovortex-235cd-default-rtdb.europe-west1.firebasedatabase.app", 
            projectId: "videovortex-235cd",
            storageBucket: "videovortex-235cd.appspot.com",
            messagingSenderId: "681594250269",
            appId: "1:681594250269:web:1176b21fcc8fe2a7d052f4",
            measurementId: "G-PHRT9C7GVP"
        };
        firebase.initializeApp(firebaseConfig);
        var storage = firebase.storage();
        var database = firebase.database();

        // Завантаження відео
        document.getElementById("upload-video").addEventListener("click", function() {
            var title = document.getElementById("video-title").value;
            var fileInput = document.getElementById("video-file");
            var file = fileInput.files[0];

            if (!title || !file) {
                alert("Будь ласка, введіть назву відео та виберіть файл.");
                return;
            }

            // Перевірка формату файлу
            var validFormats = ["video/mp4", "video/webm", "video/ogg"];
            if (!validFormats.includes(file.type)) {
                alert("Неправильний формат відео. Завантажте відео у форматі MP4, WEBM або OGG.");
                return;
            }

            var storageRef = storage.ref('videos/' + file.name);
            var uploadTask = storageRef.put(file);

            uploadTask.on('state_changed', function(snapshot) {
                var progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                console.log('Завантаження: ' + progress + '%');
            }, function(error) {
                console.error('Помилка завантаження:', error);
            }, function() {
                uploadTask.snapshot.ref.getDownloadURL().then(function(downloadURL) {
                    // Зберігаємо дані в Realtime Database
                    database.ref('videos').push({
                        title: title,
                        url: downloadURL
                    });
                    alert("Відео успішно завантажено!");
                    loadVideos(); // Оновити список відео після завантаження
                });
            });
        });

        // Завантаження та відображення всіх відео
        function loadVideos() {
            var videoGallery = document.getElementById("video-gallery");
            videoGallery.innerHTML = ''; // Очищуємо галерею

            database.ref('videos').once('value', function(snapshot) {
                snapshot.forEach(function(childSnapshot) {
                    var videoData = childSnapshot.val();
                    var videoElement = document.createElement('video');
                    var titleElement = document.createElement('p');
                    
                    titleElement.textContent = videoData.title;
                    videoElement.src = videoData.url;
                    videoElement.controls = true;

                    videoGallery.appendChild(titleElement);
                    videoGallery.appendChild(videoElement);
                });
            });
        }

        // Завантажити всі відео при завантаженні сторінки
        window.onload = function() {
            loadVideos();
        };
    </script>
</body>
</html>
