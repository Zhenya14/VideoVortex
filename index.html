<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoVortex</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
            text-align: center;
            padding: 50px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        nav {
            background: #00f2fe;
            padding: 10px;
            margin-bottom: 20px;
        }
        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            cursor: pointer;
        }
        input[type="text"], input[type="file"], input[type="email"], input[type="password"], select {
            margin: 10px 0;
            padding: 10px;
            width: 100%;
        }
        button {
            padding: 10px;
            background-color: #00f2fe;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        .video-container {
            margin-top: 20px;
        }
        video {
            display: block;
            margin: 10px auto;
            width: 100%;
            cursor: pointer;
        }
        .video-info {
            text-align: left;
            margin: 10px auto;
        }
        .auth-form, .upload-form {
            display: none;
            background-color: #333;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
        .auth-form input, .auth-form button, .upload-form input, .upload-form button {
            width: calc(100% - 20px);
            margin: 10px;
            padding: 10px;
        }
    </style>
</head>
<body>
    <nav>
        <a href="#" id="home-link">Головна</a>
        <a href="#" id="upload-link">Завантажити відео</a>
        <a href="#" id="auth-link">Аутентифікація</a>
    </nav>

    <div class="container">
        <h1>VideoVortex</h1>

        <!-- Форма аутентифікації -->
        <div class="auth-form" id="auth-form">
            <h2>Увійти</h2>
            <input type="email" id="auth-email" placeholder="Електронна пошта">
            <input type="password" id="auth-password" placeholder="Пароль">
            <button onclick="signIn()">Увійти</button>
        </div>

        <!-- Форма завантаження відео -->
        <div class="upload-form" id="upload-form">
            <h2>Завантажити відео</h2>
            <input type="text" id="video-title" placeholder="Назва відео">
            <input type="file" id="video-file" accept="video/*">
            <button onclick="uploadVideo()">Завантажити</button>
        </div>

        <div class="video-container" id="video-gallery"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBkPYP3bnDy61NFjRSboRZrfTVNTdIMWbY",
            authDomain: "videovortex-235cd.firebaseapp.com",
            databaseURL: "https://videovortex-235cd-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "videovortex-235cd",
            storageBucket: "videovortex-235cd.appspot.com",
            messagingSenderId: "681594250269",
            appId: "1:681594250269:web:1176b21fcc8fe2a7d052f4"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();
        const storage = firebase.storage();

        // Toggle authentication form
        document.getElementById("auth-link").onclick = function() {
            const authForm = document.getElementById("auth-form");
            authForm.style.display = authForm.style.display === "none" ? "block" : "none";
        };
        
        // Toggle upload form
        document.getElementById("upload-link").onclick = function() {
            const uploadForm = document.getElementById("upload-form");
            uploadForm.style.display = uploadForm.style.display === "none" ? "block" : "none";
        };

        // Sign-in function
        function signIn() {
            const email = document.getElementById("auth-email").value;
            const password = document.getElementById("auth-password").value;

            auth.signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    alert("Вхід успішний!");
                    document.getElementById("auth-form").style.display = "none";
                    document.getElementById("auth-link").style.display = "none";
                })
                .catch((error) => {
                    alert("Помилка входу: " + error.message);
                });
        }

        // Load videos from Firebase
        function loadVideos() {
            const videoGallery = document.getElementById("video-gallery");
            videoGallery.innerHTML = "";

            database.ref("videos").once("value").then((snapshot) => {
                snapshot.forEach((childSnapshot) => {
                    const videoData = childSnapshot.val();
                    const videoElement = document.createElement("div");

                    videoElement.innerHTML = `
                        <video src="${videoData.url}" controls></video>
                        <div class="video-info">
                            <p>Перегляди: ${videoData.views}</p>
                            <p>Дата публікації: ${new Date(videoData.timestamp).toLocaleDateString()}</p>
                        </div>
                    `;

                    videoElement.querySelector("video").onclick = () => displayVideoInfo(videoData);
                    videoGallery.appendChild(videoElement);
                });
            });
        }

        // Display video info
        function displayVideoInfo(videoData) {
            const authorInitials = videoData.authorName.charAt(0).toUpperCase();
            alert(`
                Назва: ${videoData.title}
                Автор: ${authorInitials}
                Дата публікації: ${new Date(videoData.timestamp).toLocaleDateString()}
                Перегляди: ${videoData.views}
            `);
        }

        // Upload video function
        function uploadVideo() {
            const videoTitle = document.getElementById("video-title").value;
            const videoFile = document.getElementById("video-file").files[0];

            if (videoTitle && videoFile) {
                const timestamp = Date.now();
                const videoRef = storage.ref().child(`videos/${videoFile.name}`);

                videoRef.put(videoFile).then((snapshot) => {
                    snapshot.ref.getDownloadURL().then((url) => {
                        const videoData = {
                            title: videoTitle,
                            url: url,
                            timestamp: timestamp,
                            views: 0,
                            authorName: auth.currentUser.displayName || "Anonymous"
                        };
                        
                        database.ref("videos").push(videoData);
                        alert("Відео успішно завантажено!");
                        loadVideos();
                        document.getElementById("upload-form").style.display = "none";
                    });
                }).catch((error) => {
                    alert("Помилка завантаження відео: " + error.message);
                });
            } else {
                alert("Будь ласка, введіть назву відео та виберіть файл.");
            }
        }

        // Load videos on page load
        window.onload = loadVideos;
    </script>
</body>
</html>
