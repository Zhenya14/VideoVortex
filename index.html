<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoVortex</title>
    <style>
        /* Основні стилі */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            display: flex;
        }

        /* Стилі для бокового меню */
        .side-menu {
            height: 100%;
            width: 250px;
            position: fixed;
            top: 0;
            left: -250px;
            background-color: #333;
            overflow-x: hidden;
            transition: 0.3s;
            padding-top: 60px;
        }

        .side-menu a {
            padding: 10px 15px;
            text-decoration: none;
            font-size: 22px;
            color: white;
            display: block;
            transition: 0.3s;
        }

        .side-menu a:hover {
            background-color: #575757;
        }

        .open-btn {
            font-size: 30px;
            cursor: pointer;
            color: white;
            background-color: #333;
            border: none;
            padding: 10px;
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10;
        }

        .main-content {
            margin-left: 0;
            transition: margin-left 0.3s;
            padding: 20px;
            width: 100%;
        }

        /* Стилі для мобільних версій */
        @media (max-width: 768px) {
            /* Мобільна версія: показуємо бокове меню */
            .side-menu {
                left: -250px;
            }

            .side-menu.open {
                left: 0;
            }

            .main-content {
                margin-left: 0;
            }

            .open-btn {
                display: block;
            }
        }

        @media (min-width: 769px) {
            /* Для ПК та планшетів */
            .side-menu {
                display: none;
            }

            .main-content {
                margin-left: 0;
            }
        }

        /* Стилі для кнопок */
        .button-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 20px;
        }

        .button-container a {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            text-align: center;
        }

        .button-container a:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <!-- Бокове меню для мобільної версії -->
    <div id="side-menu" class="side-menu">
        <a href="#" id="auth-link">Увійти</a>
        <a href="#" id="register-link">Реєстрація</a>
        <a href="#" id="upload-link" class="hidden">Завантажити відео</a>
        <a href="#" id="logout-link" class="hidden">Вийти</a>
    </div>

    <!-- Кнопка для відкриття меню на мобільних -->
    <button class="open-btn" onclick="toggleMenu()">&#9776;</button>

    <!-- Основний контент -->
    <div class="main-content">
        <div class="button-container">
            <a href="#" id="auth-link-pc">Увійти</a>
            <a href="#" id="register-link-pc">Реєстрація</a>
            <a href="#" id="upload-link-pc" class="hidden">Завантажити відео</a>
            <a href="#" id="logout-link-pc" class="hidden">Вийти</a>
        </div>

        <div id="auth-form" class="hidden">
            <h3>Увійти</h3>
            <input type="email" id="auth-email" placeholder="Email">
            <input type="password" id="auth-password" placeholder="Пароль">
            <button onclick="signIn()">Увійти</button>
        </div>

        <div id="register-form" class="hidden">
            <h3>Реєстрація</h3>
            <input type="email" id="register-email" placeholder="Email">
            <input type="password" id="register-password" placeholder="Пароль">
            <button onclick="signUp()">Зареєструватися</button>
        </div>

        <div id="upload-form" class="hidden">
            <h3>Завантажити відео</h3>
            <input type="text" id="video-title" placeholder="Назва відео">
            <input type="text" id="video-author" placeholder="Автор відео">
            <input type="file" id="video-file">
            <progress id="upload-progress" value="0" max="100"></progress>
            <p id="progress-text">0%</p>
            <button onclick="uploadVideo()">Завантажити відео</button>
        </div>

        <div id="video-gallery">
            <!-- Відео буде додаватися сюди -->
        </div>
    </div>

    <script>
        function toggleMenu() {
            const menu = document.getElementById("side-menu");
            menu.classList.toggle("open");
        }

        const firebaseConfig = {
            apiKey: "AIzaSyBkPYP3bnDy61NFjRSboRZrfTVNTdIMWbY",
            authDomain: "videovortex-235cd.firebaseapp.com",
            databaseURL: "https://videovortex-235cd-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "videovortex-235cd",
            storageBucket: "videovortex-235cd.appspot.com",
            messagingSenderId: "681594250269",
            appId: "1:681594250269:web:1176b21fcc8fe2a7d052f4"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();
        const storage = firebase.storage();

        // Показати/сховати форми
        document.getElementById("auth-link").onclick = function() {
            const authForm = document.getElementById("auth-form");
            authForm.style.display = authForm.style.display === "none" ? "block" : "none";
        };

        document.getElementById("register-link").onclick = function() {
            const registerForm = document.getElementById("register-form");
            registerForm.style.display = registerForm.style.display === "none" ? "block" : "none";
        };

        document.getElementById("upload-link").onclick = function() {
            if (auth.currentUser) {
                const uploadForm = document.getElementById("upload-form");
                uploadForm.style.display = uploadForm.style.display === "none" ? "block" : "none";
            } else {
                alert("Будь ласка, увійдіть, щоб завантажити відео.");
            }
        };

        // Функція для входу
        function signIn() {
            const email = document.getElementById("auth-email").value;
            const password = document.getElementById("auth-password").value;

            auth.signInWithEmailAndPassword(email, password)
                .then(() => {
                    alert("Вхід успішний!");
                    document.getElementById("auth-form").style.display = "none";
                    document.getElementById("auth-link").style.display = "none";
                    document.getElementById("register-link").style.display = "none";
                    document.getElementById("upload-link").style.display = "flex";
                    document.getElementById("logout-link").style.display = "flex";
                })
                .catch((error) => {
                    alert("Невірний логін або пароль.");
                });
        }

        // Функція для реєстрації
        function signUp() {
            const email = document.getElementById("register-email").value.trim();
            const password = document.getElementById("register-password").value.trim();

            if (!email || !password) {
                alert("Поля не повинні бути порожніми.");
                return;
            }

            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    alert("Ви успішно зареєструвалися!");
                    document.getElementById("auth-form").style.display = "none";
                    document.getElementById("register-form").style.display = "none";
                    document.getElementById("upload-link").style.display = "flex";
                    document.getElementById("logout-link").style.display = "flex";
                })
                .catch((error) => {
                    alert("Помилка реєстрації: " + error.message);
                });
        }

        // Завантаження відео
        function uploadVideo() {
            const videoTitle = document.getElementById("video-title").value.trim();
            const videoAuthor = document.getElementById("video-author").value.trim();
            const videoFile = document.getElementById("video-file").files[0];

            if (!videoFile || !videoTitle || !videoAuthor) {
                alert("Будь ласка, заповніть всі поля.");
                return;
            }

            const videoRef = storage.ref("videos/" + videoFile.name);
            const uploadTask = videoRef.put(videoFile);

            uploadTask.on('state_changed', (snapshot) => {
                const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                document.getElementById("upload-progress").value = progress;
                document.getElementById("progress-text").innerText = `${Math.round(progress)}%`;
            }, (error) => {
                alert("Помилка завантаження: " + error.message);
            }, () => {
                uploadTask.snapshot.ref.getDownloadURL().then((downloadURL) => {
                    const videoData = {
                        title: videoTitle,
                        author: videoAuthor,
                        url: downloadURL,
                        views: 0,
                        publishDate: new Date().toISOString()
                    };

                    database.ref("videos").push(videoData)
                        .then(() => {
                            alert("Відео завантажено!");
                            loadVideos();
                        })
                        .catch((error) => {
                            alert("Помилка завантаження відео: " + error.message);
                        });
                });
            });
        }

        // Вихід
        document.getElementById("logout-link").onclick = function() {
            auth.signOut().then(() => {
                document.getElementById("upload-link").style.display = "none";
                document.getElementById("logout-link").style.display = "none";
                document.getElementById("auth-link").style.display = "flex";
                document.getElementById("register-link").style.display = "flex";
                alert("Вихід успішний.");
            }).catch((error) => {
                alert("Помилка виходу: " + error.message);
            });
        };
    </script>
</body>
</html>
