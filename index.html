<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoVortex</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
            text-align: center;
            padding: 50px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        input[type="text"], input[type="file"], input[type="email"], input[type="password"] {
            margin: 10px 0;
            padding: 10px;
            width: 100%;
        }
        button {
            padding: 10px;
            background-color: #00f2fe;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        .video-container {
            margin-top: 20px;
        }
        video {
            display: block;
            margin: 10px auto;
            width: 100%;
        }
        .whitelist-container {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>VideoVortex</h1>

        <div id="auth-container">
            <h2>Аутентифікація</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Пароль">
            <button id="login">Увійти</button>
            <button id="logout" style="display:none;">Вихід</button>
        </div>

        <input type="text" id="video-title" placeholder="Назва відео">
        <input type="file" id="video-file" accept="video/*">
        <select id="video-privacy">
            <option value="public">Публічне</option>
            <option value="private">Приватне</option>
        </select>
        <button id="upload-video">Завантажити відео</button>
        <p id="progress"></p>
        <div class="video-container" id="video-gallery"></div>

        <div class="whitelist-container" id="whitelist-container" style="display:none;">
            <h2>Білий список</h2>
            <input type="email" id="whitelist-email" placeholder="Email для білого списку">
            <button id="add-email">Додати до білого списку</button>
            <button id="remove-email">Видалити з білого списку</button>
            <p id="whitelist-message"></p>
        </div>
    </div>

    <script>
        // Firebase налаштування
        const firebaseConfig = {
            apiKey: "AIzaSyBkPYP3bnDy61NFjRSboRZrfTVNTdIMWbY",
            authDomain: "videovortex-235cd.firebaseapp.com",
            databaseURL: "https://videovortex-235cd-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "videovortex-235cd",
            storageBucket: "videovortex-235cd.appspot.com",
            messagingSenderId: "681594250269",
            appId: "1:681594250269:web:1176b21fcc8fe2a7d052f4"
        };
        firebase.initializeApp(firebaseConfig);
        const storage = firebase.storage();
        const database = firebase.database();
        const auth = firebase.auth();

        // Аутентифікація
        document.getElementById("login").addEventListener("click", function() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            auth.signInWithEmailAndPassword(email, password).then(() => {
                document.getElementById("logout").style.display = 'inline';
                document.getElementById("whitelist-container").style.display = 'block'; // Show whitelist management
                loadVideos(); // Завантажити відео після входу
            }).catch((error) => {
                alert('Невірний логін або пароль: ' + error.message);
            });
        });

        document.getElementById("logout").addEventListener("click", function() {
            auth.signOut().then(() => {
                document.getElementById("logout").style.display = 'none';
                document.getElementById("whitelist-container").style.display = 'none'; // Hide whitelist management
                alert("Вийшли з системи!");
            }).catch((error) => {
                console.error("Вихід не вдався:", error);
            });
        });

        // Завантаження відео
        document.getElementById("upload-video").addEventListener("click", function() {
            const title = document.getElementById("video-title").value;
            const fileInput = document.getElementById("video-file");
            const file = fileInput.files[0];
            const privacy = document.getElementById("video-privacy").value;

            if (!title || !file) {
                alert("Будь ласка, введіть назву відео та виберіть файл.");
                return;
            }

            const storageRef = storage.ref('videos/' + file.name);
            const uploadTask = storageRef.put(file);

            uploadTask.on('state_changed', function(snapshot) {
                const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                document.getElementById('progress').innerText = 'Завантаження: ' + progress.toFixed(2) + '%';
            }, function(error) {
                alert('Помилка завантаження: ' + error.message);
            }, function() {
                uploadTask.snapshot.ref.getDownloadURL().then(function(downloadURL) {
                    const user = auth.currentUser;
                    database.ref('videos').push({
                        title: title,
                        url: downloadURL,
                        privacy: privacy,
                        whitelistedEmails: [], // Initial empty whitelist
                        uploadedBy: user.email // Save the uploader's email
                    });
                    alert("Відео успішно завантажено!");
                    loadVideos(); // Оновити список відео після завантаження
                });
            });
        });

        // Додавання електронної адреси до білого списку
        document.getElementById("add-email").addEventListener("click", function() {
            const emailToAdd = document.getElementById("whitelist-email").value;

            if (!emailToAdd) {
                alert("Будь ласка, введіть електронну адресу.");
                return;
            }

            const user = auth.currentUser;
            const videoRef = database.ref('videos');

            videoRef.once('value').then(snapshot => {
                let found = false;
                snapshot.forEach(childSnapshot => {
                    const videoData = childSnapshot.val();
                    if (videoData.uploadedBy === user.email) {
                        found = true;
                        const updatedEmails = [...videoData.whitelistedEmails, emailToAdd];
                        childSnapshot.ref.update({ whitelistedEmails: updatedEmails });
                        document.getElementById("whitelist-message").innerText = "Електронну адресу додано до білого списку.";
                    }
                });
                if (!found) {
                    document.getElementById("whitelist-message").innerText = "Ви не можете редагувати цей білого списку.";
                }
            }).catch((error) => {
                alert('Помилка: ' + error.message);
            });
        });

        // Видалення електронної адреси з білого списку
        document.getElementById("remove-email").addEventListener("click", function() {
            const emailToRemove = document.getElementById("whitelist-email").value;

            if (!emailToRemove) {
                alert("Будь ласка, введіть електронну адресу.");
                return;
            }

            const user = auth.currentUser;
            const videoRef = database.ref('videos');

            videoRef.once('value').then(snapshot => {
                let found = false;
                snapshot.forEach(childSnapshot => {
                    const videoData = childSnapshot.val();
                    if (videoData.uploadedBy === user.email) {
                        found = true;
                        const updatedEmails = videoData.whitelistedEmails.filter(email => email !== emailToRemove);
                        childSnapshot.ref.update({ whitelistedEmails: updatedEmails });
                        document.getElementById("whitelist-message").innerText = "Електронну адресу видалено з білого списку.";
                    }
                });
                if (!found) {
                    document.getElementById("whitelist-message").innerText = "Ви не можете редагувати цей білого списку.";
                }
            }).catch((error) => {
                alert('Помилка: ' + error.message);
            });
        });

        // Завантажити відео
        function loadVideos() {
            const videoGallery = document.getElementById("video-gallery");
            videoGallery.innerHTML = '';
            database.ref('videos').once('value', function(snapshot) {
                snapshot.forEach(function(childSnapshot) {
                    const videoData = childSnapshot.val();
                    const videoElement = document.createElement('video');
                    videoElement.src = videoData.url;
                    videoElement.controls = true;
                    const titleElement = document.createElement('h3');
                    titleElement.innerText = videoData.title;

                    // Check privacy and whitelist
                    if (videoData.privacy === 'public' || (videoData.privacy === 'private' && videoData.whitelistedEmails.includes(auth.currentUser.email))) {
                        videoGallery.appendChild(titleElement);
                        videoGallery.appendChild(videoElement);
                    }
                });
            }).catch((error) => {
                console.error("Помилка при завантаженні відео:", error);
            });
        }
    </script>
</body>
</html>
