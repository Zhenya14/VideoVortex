<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoVortex</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
            text-align: center;
            padding: 50px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        nav {
            background: #00f2fe;
            padding: 10px;
            margin-bottom: 20px;
        }
        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            cursor: pointer;
        }
        input[type="text"], input[type="file"], input[type="email"], input[type="password"], select {
            margin: 10px 0;
            padding: 10px;
            width: 100%;
        }
        button {
            padding: 10px;
            background-color: #00f2fe;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        .video-container {
            margin-top: 20px;
        }
        video {
            display: block;
            margin: 10px auto;
            width: 100%;
            cursor: pointer;
        }
        .video-info {
            text-align: left;
            margin: 10px auto;
        }
        .auth-form, .upload-form {
            display: none;
            background-color: #333;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
        .auth-form input, .auth-form button, .upload-form input, .upload-form button {
            width: calc(100% - 20px);
            margin: 10px;
            padding: 10px;
        }
    </style>
</head>
<body>
    <nav>
        <a href="#" id="home-link">Головна</a>
        <a href="#" id="upload-link">Завантажити відео</a>
        <a href="#" id="auth-link">Аутентифікація</a>
    </nav>

    <div class="container">
        <h1>VideoVortex</h1>

        <!-- Форма аутентифікації -->
        <div class="auth-form" id="auth-form">
            <h2>Увійти</h2>
            <input type="email" id="auth-email" placeholder="Електронна пошта">
            <input type="password" id="auth-password" placeholder="Пароль">
            <button onclick="signIn()">Увійти</button>
        </div>

        <!-- Форма завантаження відео -->
        <div class="upload-form" id="upload-form">
            <h2>Завантажити відео</h2>
            <input type="text" id="video-title" placeholder="Назва відео">
            <input type="file" id="video-file" accept="video/*">
            <button onclick="uploadVideo()">Завантажити</button>
        </div>

        <div class="video-container" id="video-gallery"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();
        const storage = firebase.storage();

        // Toggle authentication form
        document.getElementById("auth-link").onclick = function() {
            const authForm = document.getElementById("auth-form");
            authForm.style.display = authForm.style.display === "none" ? "block" : "none";
        };

        // Toggle upload form, only show if user is authenticated
        document.getElementById("upload-link").onclick = function() {
            if (auth.currentUser) {
                const uploadForm = document.getElementById("upload-form");
                uploadForm.style.display = uploadForm.style.display === "none" ? "block" : "none";
            } else {
                alert("Будь ласка, увійдіть, щоб завантажити відео.");
            }
        };

        // Sign in function
        function signIn() {
            const email = document.getElementById("auth-email").value;
            const password = document.getElementById("auth-password").value;

            auth.signInWithEmailAndPassword(email, password)
                .then(() => {
                    alert("Вхід успішний!");
                    document.getElementById("auth-form").style.display = "none";
                    document.getElementById("auth-link").style.display = "none";
                    document.getElementById("upload-link").style.display = "block";
                })
                .catch((error) => {
                    alert("Помилка входу: " + error.message);
                });
        }

        // Load videos with click event to update views
        // Додаємо прослуховувач події на кожне відео після завантаження галереї
function loadVideos() {
    const videoGallery = document.getElementById("video-gallery");
    videoGallery.innerHTML = "";

    database.ref("videos").once("value").then((snapshot) => {
        snapshot.forEach((childSnapshot) => {
            const videoData = childSnapshot.val();
            const videoKey = childSnapshot.key; // ключ для оновлення кількості переглядів
            const videoElement = document.createElement("div");

            videoElement.innerHTML = `
                <video src="${videoData.url}" controls onclick="increaseViews('${videoKey}')"></video>
                <div class="video-info">
                    <p>Перегляди: ${videoData.views}</p>
                    <p>Дата публікації: ${new Date(videoData.timestamp).toLocaleDateString()}</p>
                    <p>Назва: ${videoData.title}</p>
                    <p>Автор: ${videoData.authorName ? videoData.authorName.charAt(0).toUpperCase() : "Невідомий автор"}</p>
                </div>
            `;

            videoGallery.appendChild(videoElement);
        });
    });
}

// Функція для збільшення кількості переглядів
function increaseViews(videoKey) {
    const videoRef = database.ref("videos/" + videoKey + "/views");
    videoRef.transaction((currentViews) => {
        return (currentViews || 0) + 1;
    });
}


        // Video upload function, restricted to authenticated users
        // Перевірка авторизації перед завантаженням відео
function uploadVideo() {
    if (!auth.currentUser) {
        alert("Тільки авторизовані користувачі можуть завантажувати відео.");
        return;
    }

    const title = document.getElementById("video-title").value;
    const videoFile = document.getElementById("video-file").files[0];

    if (!title || !videoFile) {
        alert("Будь ласка, введіть назву відео та виберіть файл.");
        return;
    }

    const storageRef = storage.ref(`videos/${videoFile.name}`);
    const uploadTask = storageRef.put(videoFile);

    uploadTask.on('state_changed', (snapshot) => {
        const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
        console.log(`Завантаження: ${progress}%`);
    }, (error) => {
        alert("Помилка завантаження: " + error.message);
    }, () => {
        uploadTask.snapshot.ref.getDownloadURL().then((downloadURL) => {
            const videoData = {
                title: title,
                url: downloadURL,
                views: 0,
                timestamp: Date.now(),
                authorName: auth.currentUser ? auth.currentUser.email : "Невідомий автор"
            };

            database.ref("videos").push(videoData).then(() => {
                alert("Відео успішно завантажено!");
                loadVideos();
                document.getElementById("upload-form").reset();
                document.getElementById("upload-form").style.display = "none";
            });
        });
    });
}

        // Load videos when page loads
        window.onload = loadVideos;

        // Update UI for authenticated users
        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById("auth-link").style.display = "none";
                document.getElementById("upload-link").style.display = "block";
            } else {
                document.getElementById("auth-link").style.display = "block";
                document.getElementById("upload-link").style.display = "none";
            }
        });
    </script>
</body>
</html>
